apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: xgboost-ray-serve
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/stirlingw/homelab
    targetRevision: HEAD
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: ray
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
