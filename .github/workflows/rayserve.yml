name: Build and push Ray Serve

on:
  push:
    branches: [main]
    paths:
      - 'rayapp/**'

jobs:
  build:
    runs-on: self-hosted
    env:
      KUBECONFIG: /home/stirling/.kube/config
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./rayapp
          push: true
          tags: stirlingw/xgboost-ray-serve:latest

      - name: Restart Ray Serve deployment
        run: kubectl rollout restart deployment/xgboost-serve -n ray

      - name: Wait for rollout
        run: kubectl rollout status deployment/xgboost-serve -n ray --timeout=120s
