name: Build and push Ray Serve

on:
  push:
    branches: [main]
    paths:
      - 'rayapp/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./rayapp
          push: true
          tags: stirlingw/xgboost-ray-serve:latest

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Restart Ray Serve deployment
        run: kubectl rollout restart deployment/xgboost-serve -n ray

      - name: Sync ArgoCD
        run: |
          curl -sk -X POST \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_TOKEN }}" \
            https://${{ secrets.ARGOCD_SERVER }}/api/v1/applications/xgboost-ray-serve/sync
