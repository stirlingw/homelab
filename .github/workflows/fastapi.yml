name: Build and push FastAPI

on:
  push:
    branches: [main]
    paths:
      - 'fastapi/**'

jobs:
  build:
    runs-on: self-hosted
    env:
      KUBECONFIG: /home/stirling/.kube/config
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./fastapi
          push: true
          tags: stirlingw/homelab-fastapi:latest

      - name: Restart FastAPI deployment
        run: kubectl rollout restart deployment/homelab-fastapi -n ray

      - name: Wait for rollout
        run: kubectl rollout status deployment/homelab-fastapi -n ray --timeout=120s
